<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="1240" viewBox="0 0 1280 1240" font-family="Archivo, Pretendard, sans-serif">
  <rect width="1280" height="1240" fill="#FAFAFA"/>
  <text x="48" y="72" font-size="40" font-weight="700" fill="#000000" letter-spacing="-0.8">Components</text>
  <text x="48" y="104" font-size="14" fill="#666666">모든 인터랙티브 컴포넌트: default / hover / focus-visible / active / disabled / loading / error 7상태 필수</text>

  <!-- Buttons -->
  <text x="48" y="170" font-size="18" font-weight="700" fill="#000000">Button — 라벨은 동사형("협업 문의하기"), 터치 타깃 44px+</text>
  <g>
    <rect x="48" y="192" width="160" height="48" rx="24" fill="#E0F69D"/>
    <text x="80" y="222" font-size="15" font-weight="500" fill="#000000">주문하기</text>
    <text x="48" y="264" font-size="12" fill="#666666">primary / default</text>

    <rect x="248" y="192" width="160" height="48" rx="24" fill="#D2E794"/>
    <text x="280" y="222" font-size="15" font-weight="500" fill="#000000">주문하기</text>
    <text x="248" y="264" font-size="12" fill="#666666">hover (brightness 94%)</text>

    <rect x="448" y="192" width="160" height="48" rx="24" fill="#E0F69D" stroke="#000000" stroke-width="2" stroke-dasharray="none"/>
    <rect x="444" y="188" width="168" height="56" rx="28" fill="none" stroke="#000000" stroke-width="2"/>
    <text x="480" y="222" font-size="15" font-weight="500" fill="#000000">주문하기</text>
    <text x="448" y="264" font-size="12" fill="#666666">focus-visible (2px ring, offset 2)</text>

    <rect x="668" y="192" width="160" height="48" rx="24" fill="#F2F2F2"/>
    <text x="700" y="222" font-size="15" font-weight="500" fill="#666666">주문하기</text>
    <text x="668" y="264" font-size="12" fill="#666666">disabled</text>

    <rect x="868" y="192" width="180" height="48" rx="24" fill="#F2F2F2"/>
    <circle cx="898" cy="216" r="8" fill="none" stroke="#666666" stroke-width="2" stroke-dasharray="12 4"/>
    <text x="916" y="222" font-size="15" font-weight="500" fill="#666666">주문하기</text>
    <text x="868" y="264" font-size="12" fill="#666666">loading (라벨 유지 + 스피너)</text>
  </g>
  <g>
    <rect x="48" y="292" width="160" height="48" rx="24" fill="none" stroke="#E5E5E5"/>
    <text x="76" y="322" font-size="15" font-weight="500" fill="#000000">전체 보기</text>
    <text x="48" y="364" font-size="12" fill="#666666">secondary (hover: 검정 border)</text>

    <text x="288" y="322" font-size="15" font-weight="500" fill="#000000" text-decoration="underline">더 알아보기</text>
    <text x="248" y="364" font-size="12" fill="#666666">ghost (텍스트+밑줄 hover)</text>
  </g>

  <!-- ArtisanCard -->
  <text x="48" y="440" font-size="18" font-weight="700" fill="#000000">ArtisanCard — yungbld 스타일, 카드 전체가 단일 링크</text>
  <g>
    <rect x="48" y="464" width="280" height="470" rx="16" fill="#FFFFFF"/>
    <path d="M48 480 A16 16 0 0 1 64 464 H312 A16 16 0 0 1 328 480 V814 H48 Z" fill="#F2F2F2"/>
    <text x="150" y="650" font-size="12" fill="#666666">이미지 4:5</text>
    <rect x="72" y="838" width="64" height="24" rx="12" fill="#F2F2F2"/>
    <text x="84" y="854" font-size="12" fill="#000000">악기장</text>
    <text x="72" y="894" font-size="24" font-weight="700" fill="#000000">윤종국</text>
    <text x="72" y="920" font-size="15" fill="#666666">4대 가업, 북메우기</text>
    <text x="48" y="962" font-size="12" fill="#666666">default: shadow-1 · hover: shadow-2 + 이미지 scale 1.03 · active: scale 0.98</text>
  </g>

  <!-- ProductCard -->
  <g>
    <rect x="400" y="464" width="280" height="470" rx="16" fill="#FFFFFF"/>
    <path d="M400 480 A16 16 0 0 1 416 464 H664 A16 16 0 0 1 680 480 V814 H400 Z" fill="#F2F2F2"/>
    <text x="502" y="650" font-size="12" fill="#666666">이미지 4:5</text>
    <text x="424" y="850" font-size="12" fill="#666666">윤종국</text>
    <text x="424" y="884" font-size="24" font-weight="700" fill="#000000">미니어처 전통 북</text>
    <text x="424" y="916" font-size="17" font-weight="700" fill="#000000">45,000원</text>
    <text x="400" y="962" font-size="12" fill="#666666">ProductCard — 가격 bold. 품절: muted 배지 / INQUIRY_ONLY: "주문 문의" 태그</text>
  </g>

  <!-- ProjectCard -->
  <g>
    <rect x="752" y="464" width="280" height="470" rx="16" fill="#FFFFFF"/>
    <path d="M752 480 A16 16 0 0 1 768 464 H1016 A16 16 0 0 1 1032 480 V814 H752 Z" fill="#F2F2F2"/>
    <text x="854" y="650" font-size="12" fill="#666666">이미지 4:5</text>
    <rect x="776" y="838" width="52" height="24" rx="12" fill="#F2F2F2"/>
    <text x="788" y="854" font-size="12" fill="#000000">펀딩</text>
    <text x="776" y="894" font-size="24" font-weight="700" fill="#000000">장도 텀블벅 펀딩</text>
    <rect x="776" y="904" width="170" height="26" fill="#E6E090"/>
    <text x="784" y="922" font-size="14" font-weight="500" fill="#000000">펀딩률 9,800% 달성</text>
    <text x="752" y="962" font-size="12" fill="#666666">ProjectCard — resultMetric은 secondary 하이라이트</text>
  </g>

  <!-- Form -->
  <text x="48" y="1030" font-size="18" font-weight="700" fill="#000000">Form — 라벨 상시 노출, placeholder 라벨 대용 금지, 필수는 "(필수)" 텍스트</text>
  <g>
    <text x="48" y="1068" font-size="14" font-weight="500" fill="#000000">담당자 이름 (필수)</text>
    <rect x="48" y="1080" width="300" height="48" rx="8" fill="#FFFFFF" stroke="#E5E5E5"/>
    <text x="48" y="1152" font-size="12" fill="#666666">default</text>

    <text x="400" y="1068" font-size="14" font-weight="500" fill="#000000">이메일 (필수)</text>
    <rect x="400" y="1080" width="300" height="48" rx="8" fill="#FFFFFF" stroke="#000000" stroke-width="2"/>
    <text x="400" y="1152" font-size="12" fill="#666666">focus — 검정 border + 포커스 링</text>

    <text x="752" y="1068" font-size="14" font-weight="500" fill="#000000">연락처 (필수)</text>
    <rect x="752" y="1080" width="300" height="48" rx="8" fill="#FFFFFF" stroke="#D14343" stroke-width="1.5"/>
    <text x="752" y="1148" font-size="12" fill="#D14343">필수 입력 항목입니다.</text>
    <text x="752" y="1172" font-size="12" fill="#666666">error — aria-describedby 연결, 제출 실패 시 첫 에러로 포커스</text>
  </g>

  <text x="48" y="1216" font-size="13" fill="#D14343">금지: brand 색 위 흰색 텍스트 · accent(#E0F69D) 텍스트 사용 · outline:none · 카드 내 링크 중첩</text>
</svg>
