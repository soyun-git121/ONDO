<svg xmlns="http://www.w3.org/2000/svg" width="2960" height="1800" viewBox="0 0 2960 1800" font-family="Archivo, Pretendard, sans-serif">
  <rect width="2960" height="1800" fill="#FAFAFA"/>

  <!-- ══ 협업문의 ══ -->
  <text x="80" y="60" font-size="24" font-weight="700" fill="#666666">/collaboration — 협업문의 (B2B 리드 확보)</text>
  <text x="120" y="200" font-size="72" font-weight="700" fill="#000000" letter-spacing="-1.5">전통과 함께할</text>
  <text x="120" y="280" font-size="72" font-weight="700" fill="#000000" letter-spacing="-1.5">파트너를 찾습니다</text>
  <text x="120" y="340" font-size="20" fill="#666666">기업 선물, 콜라보, 체험·강연, 공공 협력까지 — 제안해 주세요.</text>

  <text x="120" y="420" font-size="14" font-weight="500" fill="#000000">문의 유형 (필수) — Inquiry.type = 수익원 분류</text>
  <g>
    <rect x="120" y="440" width="110" height="44" rx="22" fill="#E0F69D" stroke="#000000"/>
    <text x="146" y="468" font-size="14" fill="#000000">기업 선물</text>
    <rect x="246" y="440" width="120" height="44" rx="22" fill="none" stroke="#E5E5E5"/>
    <text x="270" y="468" font-size="14" fill="#000000">콜라보 제안</text>
    <rect x="382" y="440" width="110" height="44" rx="22" fill="none" stroke="#E5E5E5"/>
    <text x="404" y="468" font-size="14" fill="#000000">체험·강연</text>
    <rect x="508" y="440" width="140" height="44" rx="22" fill="none" stroke="#E5E5E5"/>
    <text x="530" y="468" font-size="14" fill="#000000">공공·기관 협력</text>
    <rect x="664" y="440" width="110" height="44" rx="22" fill="none" stroke="#E5E5E5"/>
    <text x="688" y="468" font-size="14" fill="#000000">기타 문의</text>
  </g>

  <g font-size="14" font-weight="500" fill="#000000">
    <text x="120" y="540">회사·기관명 (필수)</text>
    <text x="120" y="640">담당자 이름 (필수)</text>
    <text x="120" y="740">이메일 (필수) · 연락처 (필수)</text>
    <text x="120" y="840">문의 내용 (필수)</text>
  </g>
  <rect x="120" y="552" width="700" height="48" rx="8" fill="#FFFFFF" stroke="#E5E5E5"/>
  <rect x="120" y="652" width="700" height="48" rx="8" fill="#FFFFFF" stroke="#E5E5E5"/>
  <rect x="120" y="752" width="700" height="48" rx="8" fill="#FFFFFF" stroke="#E5E5E5"/>
  <rect x="120" y="852" width="700" height="140" rx="8" fill="#FFFFFF" stroke="#E5E5E5"/>
  <rect x="120" y="1030" width="700" height="52" rx="26" fill="#E0F69D"/>
  <text x="400" y="1062" font-size="16" font-weight="500" fill="#000000">협업 문의하기</text>
  <text x="120" y="1120" font-size="13" fill="#666666">honeypot 필드(숨김) · 제출 실패 시 첫 에러 필드 포커스 · 제출 중 loading</text>

  <text x="120" y="1220" font-size="30" font-weight="700" fill="#000000">온도가 만들어온 협업</text>
  <g>
    <rect x="120" y="1250" width="405" height="380" rx="16" fill="#FFFFFF" stroke="#E5E5E5"/>
    <rect x="120" y="1250" width="405" height="240" fill="#F2F2F2"/>
    <rect x="144" y="1510" width="52" height="24" rx="12" fill="#F2F2F2"/>
    <text x="156" y="1526" font-size="12" fill="#000000">펀딩</text>
    <text x="144" y="1562" font-size="20" font-weight="700" fill="#000000">장도 텀블벅 펀딩</text>
    <rect x="144" y="1574" width="160" height="26" fill="#E6E090"/>
    <text x="152" y="1592" font-size="13" font-weight="500" fill="#000000">펀딩률 9,800% 달성</text>
    <rect x="557" y="1250" width="405" height="380" rx="16" fill="#FFFFFF" stroke="#E5E5E5" stroke-dasharray="8 6"/>
    <text x="700" y="1445" font-size="13" fill="#666666">실적 준비 중</text>
    <rect x="994" y="1250" width="405" height="380" rx="16" fill="#FFFFFF" stroke="#E5E5E5" stroke-dasharray="8 6"/>
    <text x="1137" y="1445" font-size="13" fill="#666666">실적 준비 중</text>
  </g>
  <text x="120" y="1690" font-size="13" fill="#666666">하단: 선행 사례 섹션(예올×샤넬 등) — 콘텐츠 준비 중 빈칸</text>

  <!-- ══ News ══ -->
  <text x="1560" y="60" font-size="24" font-weight="700" fill="#666666">/news — 뉴스 목록 (탭 필터)</text>
  <text x="1620" y="200" font-size="48" font-weight="700" fill="#000000" letter-spacing="-1">News</text>
  <g>
    <rect x="1620" y="240" width="72" height="44" rx="22" fill="#000000"/>
    <text x="1640" y="268" font-size="14" fill="#FFFFFF">전체</text>
    <rect x="1708" y="240" width="110" height="44" rx="22" fill="none" stroke="#E5E5E5"/>
    <text x="1730" y="268" font-size="14" fill="#000000">온도 소식</text>
    <rect x="1834" y="240" width="110" height="44" rx="22" fill="none" stroke="#E5E5E5"/>
    <text x="1856" y="268" font-size="14" fill="#000000">전통문화</text>
    <rect x="1960" y="240" width="124" height="44" rx="22" fill="none" stroke="#E5E5E5"/>
    <text x="1982" y="268" font-size="14" fill="#000000">보유자 소식</text>
  </g>
  <g>
    <rect x="1620" y="330" width="405" height="420" rx="16" fill="#FFFFFF" stroke="#E5E5E5"/>
    <rect x="1620" y="330" width="405" height="260" fill="#F2F2F2"/>
    <rect x="1644" y="610" width="90" height="24" rx="12" fill="#F2F2F2"/>
    <text x="1656" y="626" font-size="12" fill="#000000">온도 소식</text>
    <text x="1644" y="664" font-size="20" font-weight="700" fill="#000000">뉴스 제목</text>
    <text x="1644" y="692" font-size="12" fill="#666666">출처 · 2026. 7. 1. — CURATED는 외부 링크 새 탭</text>
    <rect x="2057" y="330" width="405" height="420" rx="16" fill="#FFFFFF" stroke="#E5E5E5" stroke-dasharray="8 6"/>
    <text x="2200" y="545" font-size="13" fill="#666666">소식 준비 중</text>
    <rect x="2494" y="330" width="405" height="420" rx="16" fill="#FFFFFF" stroke="#E5E5E5" stroke-dasharray="8 6"/>
    <text x="2637" y="545" font-size="13" fill="#666666">소식 준비 중</text>
  </g>

  <!-- ══ Projects ══ -->
  <text x="1560" y="880" font-size="24" font-weight="700" fill="#666666">/projects — 협업 실적 (유형 필터 + projectDate DESC)</text>
  <text x="1620" y="1000" font-size="48" font-weight="700" fill="#000000" letter-spacing="-1">Projects</text>
  <text x="1620" y="1050" font-size="14" fill="#666666">필터 pill: 전체 / 기업 선물 / 콜라보 / 체험 / 강연 / 공공 협력 / 전시 / 펀딩 / 기타</text>
  <g>
    <rect x="1620" y="1090" width="405" height="420" rx="16" fill="#FFFFFF" stroke="#E5E5E5"/>
    <rect x="1620" y="1090" width="405" height="250" fill="#F2F2F2"/>
    <rect x="1644" y="1360" width="52" height="24" rx="12" fill="#F2F2F2"/>
    <text x="1656" y="1376" font-size="12" fill="#000000">펀딩</text>
    <text x="1644" y="1412" font-size="20" font-weight="700" fill="#000000">장도 텀블벅 펀딩</text>
    <rect x="1644" y="1424" width="160" height="26" fill="#E6E090"/>
    <text x="1652" y="1442" font-size="13" font-weight="500" fill="#000000">펀딩률 9,800% 달성</text>
    <rect x="2057" y="1090" width="405" height="420" rx="16" fill="#FFFFFF" stroke="#E5E5E5" stroke-dasharray="8 6"/>
    <text x="2200" y="1305" font-size="13" fill="#666666">실적 준비 중</text>
    <rect x="2494" y="1090" width="405" height="420" rx="16" fill="#FFFFFF" stroke="#E5E5E5" stroke-dasharray="8 6"/>
    <text x="2637" y="1305" font-size="13" fill="#666666">실적 준비 중</text>
  </g>
  <text x="1620" y="1580" font-size="13" fill="#666666">상세: 배경 → 진행 → 결과(resultMetric secondary 하이라이트) → 참여 보유자 → 협업문의 CTA</text>
</svg>
