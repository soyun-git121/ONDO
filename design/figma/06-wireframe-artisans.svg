<svg xmlns="http://www.w3.org/2000/svg" width="2960" height="2100" viewBox="0 0 2960 2100" font-family="Archivo, Pretendard, sans-serif">
  <rect width="2960" height="2100" fill="#FAFAFA"/>

  <!-- ══ 목록 (좌) ══ -->
  <text x="80" y="60" font-size="24" font-weight="700" fill="#666666">/artisans — 보유자 목록 (yungbld 무한스크롤)</text>
  <rect x="80" y="90" width="1360" height="64" fill="#FAFAFA" stroke="#E5E5E5"/>
  <text x="110" y="130" font-size="18" font-weight="700" fill="#000000" letter-spacing="2">ONDO</text>
  <text x="1300" y="130" font-size="13" fill="#666666">GNB</text>

  <text x="120" y="270" font-size="48" font-weight="700" fill="#000000" letter-spacing="-1">보유자</text>
  <text x="120" y="320" font-size="20" fill="#666666">온도와 함께하는 무형문화재 보유자들을 소개합니다.</text>

  <!-- 카드 그리드 3열 -->
  <g>
    <rect x="120" y="380" width="405" height="440" rx="16" fill="#FFFFFF" stroke="#E5E5E5"/>
    <rect x="120" y="380" width="405" height="300" fill="#F2F2F2"/>
    <rect x="144" y="700" width="64" height="24" rx="12" fill="#F2F2F2"/>
    <text x="156" y="716" font-size="12" fill="#000000">악기장</text>
    <text x="144" y="756" font-size="22" font-weight="700" fill="#000000">윤종국</text>
    <text x="144" y="782" font-size="14" fill="#666666">4대 가업, 북메우기</text>

    <rect x="557" y="380" width="405" height="440" rx="16" fill="#FFFFFF" stroke="#E5E5E5" stroke-dasharray="8 6"/>
    <text x="700" y="605" font-size="13" fill="#666666">준비 중</text>
    <rect x="994" y="380" width="405" height="440" rx="16" fill="#FFFFFF" stroke="#E5E5E5" stroke-dasharray="8 6"/>
    <text x="1137" y="605" font-size="13" fill="#666666">준비 중</text>

    <rect x="120" y="850" width="405" height="440" rx="16" fill="#F2F2F2"/>
    <text x="250" y="1075" font-size="13" fill="#666666">skeleton (로딩)</text>
    <rect x="557" y="850" width="405" height="440" rx="16" fill="#F2F2F2"/>
    <text x="687" y="1075" font-size="13" fill="#666666">skeleton</text>
    <rect x="994" y="850" width="405" height="440" rx="16" fill="#F2F2F2"/>
    <text x="1124" y="1075" font-size="13" fill="#666666">skeleton</text>
  </g>

  <rect x="620" y="1340" width="200" height="52" rx="26" fill="none" stroke="#E5E5E5"/>
  <text x="664" y="1372" font-size="15" font-weight="500" fill="#000000">보유자 더 보기</text>
  <text x="120" y="1440" font-size="13" fill="#666666">무한스크롤: IntersectionObserver + hasNext 종료 · "더 보기" 버튼 DOM 상시 제공(키보드) · aria-live "보유자 N명 추가됨" · 뒤로가기 시 위치 복원</text>
  <text x="120" y="1470" font-size="13" fill="#666666">빈 상태: "준비 중인 보유자가 있습니다" + 인스타그램 링크 · 에러: 재시도 버튼 인라인</text>

  <!-- ══ 상세 (우) ══ -->
  <text x="1560" y="60" font-size="24" font-weight="700" fill="#666666">/artisans/:slug — 보유자 개별 랜딩</text>
  <rect x="1560" y="90" width="1320" height="360" fill="#F2F2F2" stroke="#E5E5E5" stroke-dasharray="8 6"/>
  <text x="2130" y="275" font-size="15" fill="#666666">커버 이미지 (풀블리드) — 준비 중</text>

  <rect x="1600" y="500" width="180" height="28" rx="14" fill="#F2F2F2"/>
  <text x="1614" y="519" font-size="13" fill="#000000">국가무형문화재 보유자</text>
  <text x="1600" y="590" font-size="48" font-weight="700" fill="#000000" letter-spacing="-1">윤종국 <tspan font-size="32" font-weight="500" fill="#666666">악기장</tspan></text>
  <text x="1600" y="640" font-size="20" fill="#666666">4대 가업, 북메우기</text>

  <rect x="1600" y="700" width="800" height="220" fill="#FFFFFF" stroke="#E5E5E5" stroke-dasharray="8 6"/>
  <text x="1900" y="815" font-size="14" fill="#666666">스토리 (마크다운) — 원고 준비 중</text>

  <rect x="1600" y="960" width="800" height="450" fill="#F2F2F2" stroke="#E5E5E5" stroke-dasharray="8 6"/>
  <text x="1900" y="1190" font-size="14" fill="#666666">스토리 영상 16:9 — 준비 중</text>

  <text x="1600" y="1490" font-size="30" font-weight="700" fill="#000000">공방과 작업</text>
  <g>
    <rect x="1600" y="1520" width="256" height="256" rx="16" fill="#F2F2F2" stroke="#E5E5E5" stroke-dasharray="8 6"/>
    <rect x="1880" y="1520" width="256" height="256" rx="16" fill="#F2F2F2" stroke="#E5E5E5" stroke-dasharray="8 6"/>
    <rect x="2160" y="1520" width="256" height="256" rx="16" fill="#F2F2F2" stroke="#E5E5E5" stroke-dasharray="8 6"/>
    <text x="1940" y="1655" font-size="14" fill="#666666">갤러리 — 준비 중</text>
  </g>

  <text x="1600" y="1850" font-size="30" font-weight="700" fill="#000000">윤종국의 상품</text>
  <rect x="1600" y="1880" width="816" height="120" rx="16" fill="#F2F2F2" stroke="#E5E5E5" stroke-dasharray="8 6"/>
  <text x="1920" y="1945" font-size="14" fill="#666666">상품 카드 — 준비 중</text>

  <rect x="1560" y="2030" width="1320" height="70" fill="#E0F69D"/>
  <text x="1600" y="2074" font-size="20" font-weight="700" fill="#000000">협업 문의 CTA 배너</text>
</svg>
