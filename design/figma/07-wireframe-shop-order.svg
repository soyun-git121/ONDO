<svg xmlns="http://www.w3.org/2000/svg" width="2960" height="1700" viewBox="0 0 2960 1700" font-family="Archivo, Pretendard, sans-serif">
  <rect width="2960" height="1700" fill="#FAFAFA"/>

  <!-- ══ Shop 목록 ══ -->
  <text x="80" y="60" font-size="24" font-weight="700" fill="#666666">/shop — 상품 목록</text>
  <text x="120" y="160" font-size="48" font-weight="700" fill="#000000" letter-spacing="-1">Shop</text>
  <g>
    <rect x="120" y="200" width="72" height="44" rx="22" fill="#000000"/>
    <text x="140" y="228" font-size="14" fill="#FFFFFF">전체</text>
    <rect x="208" y="200" width="72" height="44" rx="22" fill="none" stroke="#E5E5E5"/>
    <text x="228" y="228" font-size="14" fill="#000000">작품</text>
    <rect x="296" y="200" width="72" height="44" rx="22" fill="none" stroke="#E5E5E5"/>
    <text x="316" y="228" font-size="14" fill="#000000">선물</text>
    <rect x="384" y="200" width="72" height="44" rx="22" fill="none" stroke="#E5E5E5"/>
    <text x="404" y="228" font-size="14" fill="#000000">소품</text>
    <rect x="1180" y="200" width="140" height="44" rx="8" fill="#FFFFFF" stroke="#E5E5E5"/>
    <text x="1204" y="228" font-size="14" fill="#000000">최신순 ▾</text>
  </g>
  <g>
    <rect x="120" y="290" width="405" height="470" rx="16" fill="#FFFFFF" stroke="#E5E5E5"/>
    <rect x="120" y="290" width="405" height="310" fill="#F2F2F2"/>
    <text x="144" y="640" font-size="12" fill="#666666">윤종국</text>
    <text x="144" y="676" font-size="22" font-weight="700" fill="#000000">미니어처 전통 북</text>
    <text x="144" y="710" font-size="17" font-weight="700" fill="#000000">45,000원</text>
    <rect x="557" y="290" width="405" height="470" rx="16" fill="#FFFFFF" stroke="#E5E5E5" stroke-dasharray="8 6"/>
    <text x="700" y="530" font-size="13" fill="#666666">준비 중</text>
    <rect x="994" y="290" width="405" height="470" rx="16" fill="#FFFFFF" stroke="#E5E5E5" stroke-dasharray="8 6"/>
    <text x="1137" y="530" font-size="13" fill="#666666">준비 중</text>
  </g>
  <text x="120" y="820" font-size="13" fill="#666666">필터: 카테고리(작품/선물/소품)+보유자 · 정렬: 최신/가격 · 페이지네이션 "다음 상품 보기"</text>

  <!-- ══ 상품 상세 ══ -->
  <text x="80" y="920" font-size="24" font-weight="700" fill="#666666">/shop/:slug — 상품 상세</text>
  <rect x="120" y="960" width="520" height="650" rx="16" fill="#F2F2F2" stroke="#E5E5E5" stroke-dasharray="8 6"/>
  <text x="320" y="1290" font-size="14" fill="#666666">상품 이미지 4:5</text>
  <g>
    <rect x="700" y="960" width="64" height="26" rx="13" fill="#F2F2F2"/>
    <text x="716" y="978" font-size="12" fill="#000000">소품</text>
    <text x="700" y="1050" font-size="42" font-weight="700" fill="#000000" letter-spacing="-0.8">미니어처 전통 북</text>
    <text x="700" y="1104" font-size="30" font-weight="700" fill="#000000">45,000원</text>
    <rect x="700" y="1140" width="600" height="90" rx="16" fill="#FFFFFF" stroke="#E5E5E5"/>
    <text x="724" y="1178" font-size="16" font-weight="700" fill="#000000">윤종국 <tspan font-weight="500" fill="#666666">악기장</tspan></text>
    <text x="724" y="1204" font-size="14" fill="#666666">4대 가업, 북메우기 → 보유자 랜딩 연결</text>
    <text x="700" y="1270" font-size="14" font-weight="500" fill="#000000">수량</text>
    <rect x="750" y="1244" width="96" height="44" rx="8" fill="#FFFFFF" stroke="#E5E5E5"/>
    <rect x="700" y="1310" width="600" height="52" rx="26" fill="#E0F69D"/>
    <text x="950" y="1342" font-size="16" font-weight="500" fill="#000000">주문하기</text>
    <text x="700" y="1400" font-size="13" fill="#666666">status 분기 — SOLD_OUT: 비활성 "품절된 상품입니다" / INQUIRY_ONLY: "작품 구매 문의하기" → /collaboration</text>
    <text x="700" y="1428" font-size="13" fill="#666666">externalUrl 있으면 "외부 판매처에서 보기" secondary 버튼 병행</text>
  </g>

  <!-- ══ 주문서 ══ -->
  <text x="1560" y="60" font-size="24" font-weight="700" fill="#666666">/order — 주문서 (실결제 없음 → PENDING → 입금 안내)</text>
  <text x="1620" y="160" font-size="42" font-weight="700" fill="#000000" letter-spacing="-0.8">주문서</text>
  <rect x="1620" y="200" width="700" height="140" rx="16" fill="#FFFFFF" stroke="#E5E5E5"/>
  <text x="1648" y="248" font-size="15" fill="#000000">미니어처 전통 북 <tspan fill="#666666">윤종국 · 2개</tspan></text>
  <text x="2160" y="248" font-size="16" font-weight="700" fill="#000000">90,000원</text>
  <line x1="1620" y1="276" x2="2320" y2="276" stroke="#E5E5E5"/>
  <text x="1648" y="316" font-size="16" font-weight="700" fill="#000000">합계</text>
  <text x="2160" y="316" font-size="20" font-weight="700" fill="#000000">90,000원</text>

  <g font-size="14" font-weight="500" fill="#000000">
    <text x="1620" y="400">주문자 이름 (필수)</text>
    <text x="1620" y="500">연락처 (필수)</text>
    <text x="1620" y="600">이메일 (필수)</text>
    <text x="1620" y="700">우편번호 (필수) · 주소 (필수) · 상세 주소</text>
    <text x="1620" y="800">배송 메모</text>
  </g>
  <rect x="1620" y="412" width="700" height="48" rx="8" fill="#FFFFFF" stroke="#E5E5E5"/>
  <rect x="1620" y="512" width="700" height="48" rx="8" fill="#FFFFFF" stroke="#E5E5E5"/>
  <rect x="1620" y="612" width="700" height="48" rx="8" fill="#FFFFFF" stroke="#E5E5E5"/>
  <rect x="1620" y="712" width="700" height="48" rx="8" fill="#FFFFFF" stroke="#E5E5E5"/>
  <rect x="1620" y="812" width="700" height="80" rx="8" fill="#FFFFFF" stroke="#E5E5E5"/>
  <rect x="1620" y="930" width="700" height="52" rx="26" fill="#E0F69D"/>
  <text x="1900" y="962" font-size="16" font-weight="500" fill="#000000">주문 접수하기</text>

  <!-- 입금 안내 -->
  <text x="1560" y="1080" font-size="24" font-weight="700" fill="#666666">주문 완료 → 입금 안내 화면</text>
  <rect x="1620" y="1120" width="700" height="300" rx="16" fill="#FFFFFF" stroke="#E5E5E5"/>
  <text x="1810" y="1180" font-size="28" font-weight="700" fill="#000000">주문이 접수되었습니다</text>
  <text x="1830" y="1220" font-size="15" fill="#666666">주문번호 ONDO-20260712-A3F9K2</text>
  <rect x="1660" y="1250" width="620" height="130" rx="8" fill="#F2F2F2"/>
  <text x="1688" y="1292" font-size="15" font-weight="700" fill="#000000">입금 안내</text>
  <text x="1688" y="1322" font-size="14" fill="#000000">결제 금액 90,000원 · 입금 계좌: (준비 중)</text>
  <text x="1688" y="1348" font-size="13" fill="#666666">입금 확인 후 상품 준비 시작 — PAID 전이는 admin 수동 처리</text>
</svg>
