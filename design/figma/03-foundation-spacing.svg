<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" font-family="Archivo, Pretendard, sans-serif">
  <rect width="1280" height="760" fill="#FAFAFA"/>
  <text x="48" y="72" font-size="40" font-weight="700" fill="#000000" letter-spacing="-0.8">Foundation / Spacing · Radius · Motion</text>
  <text x="48" y="104" font-size="14" fill="#666666">4px 기반 스케일 — 토큰 외 일회성 여백 금지</text>

  <!-- Spacing bars -->
  <text x="48" y="160" font-size="18" font-weight="700" fill="#000000">Spacing</text>
  <g fill="#8BE6D9">
    <rect x="200" y="180" width="4" height="24"/>
    <rect x="200" y="216" width="8" height="24"/>
    <rect x="200" y="252" width="16" height="24"/>
    <rect x="200" y="288" width="24" height="24"/>
    <rect x="200" y="324" width="32" height="24"/>
    <rect x="200" y="360" width="48" height="24"/>
    <rect x="200" y="396" width="64" height="24"/>
    <rect x="200" y="432" width="96" height="24"/>
    <rect x="200" y="468" width="160" height="24"/>
  </g>
  <g font-size="13" fill="#000000">
    <text x="48" y="197">space-1 · 4px</text>
    <text x="48" y="233">space-2 · 8px</text>
    <text x="48" y="269">space-3 · 16px</text>
    <text x="48" y="305">space-4 · 24px</text>
    <text x="48" y="341">space-5 · 32px</text>
    <text x="48" y="377">space-6 · 48px</text>
    <text x="48" y="413">space-7 · 64px</text>
    <text x="48" y="449">space-8 · 96px</text>
    <text x="48" y="485">space-9 · 160px</text>
  </g>
  <g font-size="12" fill="#666666">
    <text x="420" y="305">카드 내부 패딩</text>
    <text x="420" y="449">섹션 수직 간격 (모바일 space-7)</text>
    <text x="420" y="485">홈 섹션 간격 (모바일 space-8)</text>
  </g>

  <!-- Radius -->
  <text x="720" y="160" font-size="18" font-weight="700" fill="#000000">Radius</text>
  <rect x="720" y="180" width="120" height="72" rx="8" fill="#FFFFFF" stroke="#E5E5E5"/>
  <text x="720" y="276" font-size="12" fill="#666666">sm 8px — 입력·버튼(사각)</text>
  <rect x="880" y="180" width="120" height="72" rx="16" fill="#FFFFFF" stroke="#E5E5E5"/>
  <text x="880" y="276" font-size="12" fill="#666666">md 16px — 카드</text>
  <rect x="1040" y="180" width="140" height="48" rx="24" fill="#8BE6D9"/>
  <text x="1040" y="276" font-size="12" fill="#666666">pill 999px — CTA·태그</text>

  <!-- Shadow -->
  <text x="720" y="340" font-size="18" font-weight="700" fill="#000000">Shadow</text>
  <rect x="720" y="360" width="180" height="90" rx="16" fill="#FFFFFF"/>
  <text x="720" y="480" font-size="12" fill="#666666">shadow-1 — 카드 기본 (0 1px 4px 6%)</text>
  <rect x="960" y="360" width="180" height="90" rx="16" fill="#FFFFFF"/>
  <text x="960" y="480" font-size="12" fill="#666666">shadow-2 — hover·모달 (0 4px 16px 12%)</text>

  <!-- Motion / Layout -->
  <text x="48" y="580" font-size="18" font-weight="700" fill="#000000">Motion</text>
  <text x="48" y="612" font-size="13" fill="#000000">fast 200ms — hover·focus 전환 · base 400ms — 카드 등장·페이드 · ease cubic-bezier(0.22, 1, 0.36, 1)</text>
  <text x="48" y="636" font-size="13" fill="#D14343">prefers-reduced-motion: reduce → 모든 애니메이션 0ms</text>

  <text x="48" y="692" font-size="18" font-weight="700" fill="#000000">Layout</text>
  <text x="48" y="724" font-size="13" fill="#000000">컨테이너 max 1280px · 좌우 패딩 32px(모바일 16px) · 12컬럼 · 카드 그리드 3/2/1열 gap 24px · 브레이크포인트 640/768/1024/1280</text>
</svg>
