spring:
  profiles:
    active: dev

  jpa:
    open-in-view: false
    properties:
      hibernate:
        default_batch_fetch_size: 100

ondo:
  jwt:
    secret: ${JWT_SECRET:dev-only-secret-key-change-me-in-production-1234567890}
    access-token-validity: 1800      # 30분 (초)
    refresh-token-validity: 1209600  # 14일 (초)

---
# ===== dev: H2 인메모리 =====
spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:h2:mem:ondo;MODE=MySQL;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop          # 엔티티 기준 테이블 자동 생성
    defer-datasource-initialization: true
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  sql:
    init:
      mode: always                   # data.sql 시드 실행

logging:
  level:
    org.hibernate.orm.jdbc.bind: trace

---
# ===== prod: MySQL =====
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/ondo?serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate             # 운영은 스키마 검증만 (변경은 마이그레이션으로)

  sql:
    init:
      mode: never
